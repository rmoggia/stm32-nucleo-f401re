
<style>
  * { box-sizing: border-box; }
  .wrap { padding: 12px 0; font-size: 13px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; }
  .toolbar input {
    flex: 1; min-width: 120px; max-width: 200px;
    padding: 5px 10px; border-radius: 8px; border: 1px solid var(--color-border-secondary);
    background: var(--color-background-primary); color: var(--color-text-primary); font-size: 12px;
  }
  .filter-group { display: flex; flex-wrap: wrap; gap: 4px; }
  .fbtn {
    padding: 3px 10px; border-radius: 6px; border: 1px solid var(--color-border-secondary);
    background: var(--color-background-secondary); color: var(--color-text-secondary);
    cursor: pointer; font-size: 11px; font-weight: 500; transition: all .12s;
  }
  .fbtn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .stats { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 6px 8px; font-size: 11px; font-weight: 500;
    color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border-tertiary);
    text-transform: uppercase; letter-spacing: .05em; position: sticky; top: 0;
    background: var(--color-background-primary);
  }
  tbody tr { border-bottom: 1px solid var(--color-border-tertiary); transition: background .1s; }
  tbody tr:hover { background: var(--color-background-secondary); }
  td { padding: 6px 8px; vertical-align: middle; }
  .td-pin { font-family: var(--font-mono); font-weight: 500; font-size: 12px; color: var(--color-text-primary); white-space: nowrap; }
  .td-port { font-size: 11px; color: var(--color-text-secondary); }
  .td-conn { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
  .hdr-badge { font-size: 10px; font-weight: 500; padding: 1px 5px; border-radius: 4px; margin-left: 3px; }
  .hdr-cn7  { background: #CECBF6; color: #3C3489; }
  .hdr-cn10 { background: #9FE1CB; color: #085041; }
  .hdr-ard  { background: #FAC775; color: #633806; }
  .cat-badge { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 5px; white-space: nowrap; }
  .cat-gpio  { background: #D3D1C7; color: #444441; }
  .cat-adc   { background: #B5D4F4; color: #0C447C; }
  .cat-pwm   { background: #C0DD97; color: #27500A; }
  .cat-uart  { background: #F5C4B3; color: #712B13; }
  .cat-spi   { background: #F4C0D1; color: #72243E; }
  .cat-i2c   { background: #CECBF6; color: #3C3489; }
  .cat-debug { background: #F7C1C1; color: #791F1F; }
  .cat-osc   { background: #D3D1C7; color: #5F5E5A; }
  .af-chips { display: flex; flex-wrap: wrap; gap: 3px; }
  .af { font-size: 10px; font-family: var(--font-mono); padding: 1px 5px; border-radius: 4px;
        background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary);
        color: var(--color-text-secondary); white-space: nowrap; }
  .warn { font-size: 10px; color: #A32D2D; font-weight: 500; }
  .tbl-wrap { max-height: 440px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--color-border-tertiary); }
  .legend { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .leg { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--color-text-secondary); }
  .leg-dot { width: 9px; height: 9px; border-radius: 3px; }
</style>
<div class="wrap">
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#B4B2A9"></div>GPIO</div>
    <div class="leg"><div class="leg-dot" style="background:#85B7EB"></div>ADC</div>
    <div class="leg"><div class="leg-dot" style="background:#97C459"></div>PWM</div>
    <div class="leg"><div class="leg-dot" style="background:#F0997B"></div>UART</div>
    <div class="leg"><div class="leg-dot" style="background:#ED93B1"></div>SPI</div>
    <div class="leg"><div class="leg-dot" style="background:#AFA9EC"></div>I²C</div>
    <div class="leg"><div class="leg-dot" style="background:#F09595"></div>Debug⚠</div>
    <div class="leg"><div class="leg-dot" style="background:#D3D1C7"></div>OSC</div>
    <div style="margin-left:8px;display:flex;gap:6px;align-items:center">
      <span class="hdr-badge hdr-cn7" style="margin:0">CN7</span>
      <span class="hdr-badge hdr-cn10" style="margin:0">CN10</span>
      <span class="hdr-badge hdr-ard" style="margin:0">Arduino</span>
    </div>
  </div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Cerca pin o funzione...">
    <div class="filter-group" id="fg-hdr">
      <button class="fbtn active" data-hdr="all">Tutti</button>
      <button class="fbtn" data-hdr="CN7">Solo CN7</button>
      <button class="fbtn" data-hdr="CN10">Solo CN10</button>
      <button class="fbtn" data-hdr="Arduino">Solo Arduino</button>
    </div>
    <div class="filter-group" id="fg-cat">
      <button class="fbtn active" data-cat="all">Funzioni</button>
      <button class="fbtn" data-cat="gpio">GPIO</button>
      <button class="fbtn" data-cat="adc">ADC</button>
      <button class="fbtn" data-cat="pwm">PWM</button>
      <button class="fbtn" data-cat="uart">UART</button>
      <button class="fbtn" data-cat="spi">SPI</button>
      <button class="fbtn" data-cat="i2c">I²C</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Pin</th><th>Connettore</th><th>Cat.</th><th>Funzioni alternate</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const pins = [
  {pin:'PA0', port:'A',hdr:'Arduino',conn:'A0 / CN8',cat:'adc',  af:['ADC1_IN0','TIM2_CH1','TIM5_CH1','WKUP']},
  {pin:'PA1', port:'A',hdr:'Arduino',conn:'A1 / CN8',cat:'adc',  af:['ADC1_IN1','TIM2_CH2','TIM5_CH2','USART2_RTS']},
  {pin:'PA2', port:'A',hdr:'Arduino',conn:'D1 / CN9',cat:'uart', af:['USART2_TX','TIM2_CH3','ADC1_IN2']},
  {pin:'PA3', port:'A',hdr:'Arduino',conn:'D0 / CN9',cat:'uart', af:['USART2_RX','TIM2_CH4','ADC1_IN3']},
  {pin:'PA4', port:'A',hdr:'Arduino',conn:'A2 / CN8',cat:'adc',  af:['ADC1_IN4','DAC_OUT1','SPI1_NSS','USART2_CK']},
  {pin:'PA5', port:'A',hdr:'Arduino',conn:'D13/LED / CN5',cat:'spi', af:['SPI1_SCK','TIM2_CH1','DAC_OUT2']},
  {pin:'PA6', port:'A',hdr:'Arduino',conn:'D12 / CN5',cat:'spi', af:['SPI1_MISO','TIM3_CH1','TIM13_CH1']},
  {pin:'PA7', port:'A',hdr:'Arduino',conn:'D11 / CN5',cat:'spi', af:['SPI1_MOSI','TIM3_CH2','TIM14_CH1']},
  {pin:'PA8', port:'A',hdr:'Arduino',conn:'D7 / CN9', cat:'gpio',af:['TIM1_CH1','I2C3_SCL','MCO1','USART1_CK']},
  {pin:'PA9', port:'A',hdr:'Arduino',conn:'D8 / CN5', cat:'uart',af:['USART1_TX','TIM1_CH2','I2C3_SMBA']},
  {pin:'PA10',port:'A',hdr:'Arduino',conn:'D2 / CN9', cat:'uart',af:['USART1_RX','TIM1_CH3','OTG_FS_ID']},
  {pin:'PA11',port:'A',hdr:'CN10',   conn:'CN10',      cat:'gpio',af:['TIM1_CH4','CAN1_RX','OTG_FS_DM','USART1_CTS']},
  {pin:'PA12',port:'A',hdr:'CN10',   conn:'CN10',      cat:'gpio',af:['TIM1_ETR','CAN1_TX','OTG_FS_DP','USART1_RTS']},
  {pin:'PA13',port:'A',hdr:'CN7',    conn:'CN7 (SWD)', cat:'debug',af:['SWDIO','JTMS','⚠️ non usare']},
  {pin:'PA14',port:'A',hdr:'CN7',    conn:'CN7 (SWD)', cat:'debug',af:['SWCLK','JTCK','⚠️ non usare']},
  {pin:'PA15',port:'A',hdr:'CN7',    conn:'CN7',       cat:'spi', af:['JTDI','SPI1_NSS','SPI3_NSS','TIM2_CH1','I2S3_WS']},
  {pin:'PB0', port:'B',hdr:'Arduino',conn:'A3 / CN8',  cat:'adc', af:['ADC1_IN8','TIM1_CH2N','TIM3_CH3']},
  {pin:'PB1', port:'B',hdr:'CN10',   conn:'CN10',      cat:'adc', af:['ADC1_IN9','TIM1_CH3N','TIM3_CH4']},
  {pin:'PB2', port:'B',hdr:'CN10',   conn:'CN10',      cat:'gpio',af:['BOOT1','GPIO']},
  {pin:'PB3', port:'B',hdr:'Arduino',conn:'D3 / CN9',  cat:'pwm', af:['TIM2_CH2','SPI1_SCK','SPI3_SCK','JTDO']},
  {pin:'PB4', port:'B',hdr:'Arduino',conn:'D5 / CN9',  cat:'pwm', af:['TIM3_CH1','SPI1_MISO','SPI3_MISO','NJTRST']},
  {pin:'PB5', port:'B',hdr:'Arduino',conn:'D4 / CN9',  cat:'gpio',af:['TIM3_CH2','SPI1_MOSI','I2C1_SMBA']},
  {pin:'PB6', port:'B',hdr:'Arduino',conn:'D10 / CN5', cat:'pwm', af:['TIM4_CH1','I2C1_SCL','USART1_TX']},
  {pin:'PB7', port:'B',hdr:'CN7',    conn:'CN7',       cat:'i2c', af:['TIM4_CH2','I2C1_SDA','USART1_RX']},
  {pin:'PB8', port:'B',hdr:'CN7',    conn:'CN7',       cat:'i2c', af:['I2C1_SCL','TIM4_CH3','TIM10_CH1','CAN1_RX','SDIO_D4']},
  {pin:'PB9', port:'B',hdr:'CN7',    conn:'CN7',       cat:'i2c', af:['I2C1_SDA','TIM4_CH4','TIM11_CH1','SPI2_NSS','I2S2_WS']},
  {pin:'PB10',port:'B',hdr:'Arduino',conn:'D6 / CN9',  cat:'pwm', af:['TIM2_CH3','I2C2_SCL','SPI2_SCK','USART3_TX']},
  {pin:'PB12',port:'B',hdr:'CN10',   conn:'CN10',      cat:'spi', af:['SPI2_NSS','I2S2_WS','TIM1_BKIN','I2C2_SMBA']},
  {pin:'PB13',port:'B',hdr:'CN10',   conn:'CN10',      cat:'spi', af:['SPI2_SCK','I2S2_CK','TIM1_CH1N']},
  {pin:'PB14',port:'B',hdr:'CN10',   conn:'CN10',      cat:'spi', af:['SPI2_MISO','TIM1_CH2N','TIM12_CH1']},
  {pin:'PB15',port:'B',hdr:'CN10',   conn:'CN10',      cat:'spi', af:['SPI2_MOSI','I2S2_SD','TIM1_CH3N','TIM12_CH2']},
  {pin:'PC0', port:'C',hdr:'Arduino',conn:'A5 / CN8',  cat:'adc', af:['ADC1_IN10']},
  {pin:'PC1', port:'C',hdr:'Arduino',conn:'A4 / CN8',  cat:'adc', af:['ADC1_IN11','SPI2_MOSI']},
  {pin:'PC2', port:'C',hdr:'CN7',    conn:'CN7',       cat:'adc', af:['ADC1_IN12','SPI2_MISO','I2S2ext_SD']},
  {pin:'PC3', port:'C',hdr:'CN7',    conn:'CN7',       cat:'adc', af:['ADC1_IN13','SPI2_MOSI','I2S2_SD']},
  {pin:'PC4', port:'C',hdr:'CN10',   conn:'CN10',      cat:'adc', af:['ADC1_IN14']},
  {pin:'PC5', port:'C',hdr:'CN10',   conn:'CN10',      cat:'adc', af:['ADC1_IN15','USART3_RX']},
  {pin:'PC6', port:'C',hdr:'CN10',   conn:'CN10',      cat:'uart',af:['TIM3_CH1','USART6_TX','SDIO_D6','I2S2_MCK']},
  {pin:'PC7', port:'C',hdr:'Arduino',conn:'D9 / CN5',  cat:'pwm', af:['TIM3_CH2','USART6_RX','SDIO_D7','I2S3_MCK']},
  {pin:'PC8', port:'C',hdr:'CN10',   conn:'CN10',      cat:'gpio',af:['TIM3_CH3','USART6_CK','SDIO_D0','TIM8_CH3']},
  {pin:'PC9', port:'C',hdr:'CN10',   conn:'CN10',      cat:'gpio',af:['TIM3_CH4','I2C3_SDA','MCO2','SDIO_D1']},
  {pin:'PC10',port:'C',hdr:'CN7',    conn:'CN7',       cat:'uart',af:['USART3_TX','UART4_TX','SPI3_SCK','SDIO_D2']},
  {pin:'PC11',port:'C',hdr:'CN7',    conn:'CN7',       cat:'uart',af:['USART3_RX','UART4_RX','SPI3_MISO','SDIO_D3']},
  {pin:'PC12',port:'C',hdr:'CN7',    conn:'CN7',       cat:'spi', af:['SPI3_MOSI','USART3_CK','UART5_TX','SDIO_CK']},
  {pin:'PC13',port:'C',hdr:'CN7',    conn:'CN7 (BTN)', cat:'gpio',af:['GPIO_Input','EXTI13','RTC_AF1']},
  {pin:'PC14',port:'C',hdr:'CN7',    conn:'CN7 (OSC32)',cat:'osc',af:['OSC32_IN','LSE']},
  {pin:'PC15',port:'C',hdr:'CN7',    conn:'CN7 (OSC32)',cat:'osc',af:['OSC32_OUT','LSE']},
  {pin:'PD2', port:'D',hdr:'CN7',    conn:'CN7',       cat:'uart',af:['UART5_RX','TIM3_ETR','SDIO_CMD']},
  {pin:'PH0', port:'H',hdr:'CN7',    conn:'CN7 (OSC)', cat:'osc', af:['OSC_IN','HSE']},
  {pin:'PH1', port:'H',hdr:'CN7',    conn:'CN7 (OSC)', cat:'osc', af:['OSC_OUT','HSE']},
];

let filterHdr = 'all', filterCat = 'all', filterText = '';

function hdrClass(h) {
  if (h==='CN7') return 'hdr-cn7';
  if (h==='CN10') return 'hdr-cn10';
  return 'hdr-ard';
}

function render() {
  const q = filterText.toLowerCase();
  const filtered = pins.filter(p => {
    if (filterHdr !== 'all' && p.hdr !== filterHdr) return false;
    if (filterCat !== 'all' && p.cat !== filterCat) return false;
    if (q && !p.pin.toLowerCase().includes(q) && !p.af.join(' ').toLowerCase().includes(q) && !p.conn.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('stats').textContent = `${filtered.length} pin mostrati su ${pins.length} totali`;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(p => `
    <tr>
      <td class="td-pin">${p.pin}<br><span class="td-port">PORT${p.port}</span></td>
      <td class="td-conn">${p.conn}<span class="hdr-badge ${hdrClass(p.hdr)}">${p.hdr}</span></td>
      <td><span class="cat-badge cat-${p.cat}">${p.cat.toUpperCase()}${p.cat==='debug'?' ⚠️':''}</span></td>
      <td><div class="af-chips">${p.af.map(a=>`<span class="af">${a}</span>`).join('')}</div></td>
    </tr>
  `).join('');
}

document.getElementById('search').addEventListener('input', e => { filterText = e.target.value; render(); });

document.getElementById('fg-hdr').addEventListener('click', e => {
  const btn = e.target.closest('[data-hdr]'); if (!btn) return;
  filterHdr = btn.dataset.hdr;
  document.querySelectorAll('#fg-hdr .fbtn').forEach(b => b.classList.toggle('active', b===btn));
  render();
});

document.getElementById('fg-cat').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]'); if (!btn) return;
  filterCat = btn.dataset.cat;
  document.querySelectorAll('#fg-cat .fbtn').forEach(b => b.classList.toggle('active', b===btn));
  render();
});

render();
</script>
